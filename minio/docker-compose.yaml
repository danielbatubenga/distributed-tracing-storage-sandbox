version: "3.9"

networks:
  observability:
    driver: bridge

volumes:
  minio-data:

services:

  # ══════════════════════════════════════════════════════════════════════════
  # MINIO (Object Storage)
  # ══════════════════════════════════════════════════════════════════════════
  minio:
    image: minio/minio:RELEASE.2024-01-11T04-46-38Z
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"       # API
      - "9001:9001"       # Consola Web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - observability
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # MINIO CLIENT (Criador Automático de Buckets)
  # ──────────────────────────────────────────────────────────────────────────
  minio-create-buckets:
    image: minio/mc:latest # Versão alinhada com o MinIO
    container_name: minio-create-buckets
    depends_on:
      minio:
        condition: service_healthy # Só executa quando o MinIO estiver pronto
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing myminio/loki-logs;
      /usr/bin/mc mb --ignore-existing myminio/tempo-traces;
      exit 0;
      "
    networks:
      - observability
