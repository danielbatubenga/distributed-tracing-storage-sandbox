# Grafana Loki Configuration
# Retenção local: 2h (ingester) → arquivo de longo prazo: MinIO (S3-compatible)

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Ingester: mantém chunks localmente até 2h, depois descarrega para o MinIO
ingester:
  chunk_idle_period: 2h      # flush se o chunk ficar inactivo 2h
  max_chunk_age: 2h          # flush forçado ao atingir 2h de idade
  chunk_target_size: 1048576 # ~1 MB por chunk
  chunk_retain_period: 0s    # não guardar cópia local após flush

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: s3       # MinIO é S3-compatible
      schema: v13
      index:
        prefix: index_
        period: 24h

# Armazenamento: índice local (tsdb) + chunks no MinIO
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache
  aws:
    s3: http://minioadmin:minioadmin@minio:9000/loki
    s3forcepathstyle: true   # obrigatório para MinIO (path-style)

# Limites de ingestão
limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  retention_period: 744h     # 31 dias no MinIO

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  delete_request_store: s3

ruler:
  alertmanager_url: http://localhost:9093

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

analytics:
  reporting_enabled: false
