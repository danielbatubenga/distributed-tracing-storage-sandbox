#        condition: service_started
#    healthcheck:
#      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/facturacao-ms-core/actuator/health"]
#      interval: 30s
#      timeout: 10s
#      retries: 5
#      start_period: 60s    # Dá tempo ao Spring Boot para iniciar

  # ══════════════════════════════════════════════════════════════════════════
  # INFRA DE OBSERVABILIDADE
  # ══════════════════════════════════════════════════════════════════════════

  # ──────────────────────────────────────────────────
  # OpenTelemetry Collector
  # Recebe traces/metrics OTLP e roteia para Tempo/Prometheus
  # ──────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    volumes:
      - ./otl-collector/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (recebe traces da app)
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics (do próprio collector)
    networks:
      - observability
    depends_on:
      tempo:
        condition: service_healthy
    # A imagem distroless não tem shell/wget — healthcheck removido.
    # O OTel SDK da app faz retry automático à ligação gRPC.

  # ──────────────────────────────────────────────────
  # Grafana Tempo - Distributed Tracing
  # ──────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana datasource)
    networks:
      - observability
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────
  # MinIO - Object Storage (arquivo de logs > 2h)
  # Console: http://localhost:9001  user: minioadmin / minioadmin
  # ──────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console Web
    networks:
      - observability
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cria os buckets "loki" e "tempo" no MinIO na primeira execução
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - observability
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/loki;
        mc mb --ignore-existing local/tempo;
        echo 'Buckets loki e tempo prontos.';
      "

  # ──────────────────────────────────────────────────
  # Grafana Loki - Log Aggregation
  # ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - observability
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────
  # Promtail - Log Shipper
  # Descobre containers com label "logging=promtail"
  # e envia os logs JSON para o Loki
  # ──────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/promtail-config.yaml"]
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      # Socket Docker para descoberta automática de containers
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - observability
    depends_on:
      loki:
        condition: service_healthy

  # ──────────────────────────────────────────────────
  # Prometheus - Metrics
  # ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────
  # Grafana - Dashboards e Alertas
  # ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.1
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
      - GF_EXPLORE_ENABLED=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - observability
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
  
  