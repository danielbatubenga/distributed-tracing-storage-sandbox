version: "3.9"

# Stack de Observabilidade - AGT Facturação MS Core
#
# Uso:
#   docker compose -f docs/observability/docker-compose.observability.yml up -d --build
#
# Para subir só a infra (sem a app):
#   docker compose -f docs/observability/docker-compose.observability.yml up -d \
#     otel-collector tempo loki promtail prometheus grafana
#
# Ficheiros de configuração necessários (relativos a este ficheiro):
#   ./otel-collector-config.yaml
#   ./tempo.yaml
#   ./loki-config.yaml
#   ./promtail-config.yaml
#   ./prometheus.yml
#   ./alert-rules.yml
#   ./grafana/provisioning/
#   ./grafana/dashboards/
#
# Dockerfile da app:
#   ../../Dockerfile.dev  (raiz do projecto)

networks:
  observability:
    driver: bridge

volumes:
  grafana-data:
  prometheus-data:
  loki-data:
  tempo-data:
  minio-data:
#  oracle-data:
#  mongodb-data:

services:

  # ══════════════════════════════════════════════════════════════════════════
  # APLICAÇÃO
