# Prometheus Alert Rules - AGT Facturação MS Core
# Alertas para séries: disponibilidade, latência, validação, integrações

groups:

  # ──────────────────────────────────────────────────
  # CRÍTICOS (P1) - Acção imediata
  # ──────────────────────────────────────────────────
  - name: series-critical
    rules:

      - alert: SeriesCreationHighErrorRate
        expr: |
          (
            rate(series_failed_total{module="facturacao-ms-core"}[5m])
            /
            (rate(series_created_total{module="facturacao-ms-core"}[5m]) + rate(series_failed_total{module="facturacao-ms-core"}[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: critical
          team: facturacao
        annotations:
          summary: "Taxa de erro de criação de séries acima de 5%"
          description: |
            Taxa de erro actual: {{ $value | humanizePercentage }}
            Serviço: {{ $labels.service }}
            Verificar: traces no Grafana Tempo + logs no Loki

      - alert: ApplicationDown
        expr: up{job="facturacao-ms-core"} == 0
        for: 1m
        labels:
          severity: critical
          team: facturacao
        annotations:
          summary: "Aplicação facturacao-ms-core indisponível"
          description: "O endpoint de métricas não responde há mais de 1 minuto."

  # ──────────────────────────────────────────────────
  # ALTOS (P2) - Responder em <30min
  # ──────────────────────────────────────────────────
  - name: series-high
    rules:

      - alert: SeriesCreationHighLatencyP95
        expr: |
          histogram_quantile(0.95,
            rate(series_creation_duration_seconds_bucket{module="facturacao-ms-core"}[5m])
          ) > 10
        for: 5m
        labels:
          severity: high
          team: facturacao
        annotations:
          summary: "Latência P95 de criação de séries acima de 10s"
          description: |
            P95 actual: {{ $value }}s
            SLO: 95% das criações em ≤ 10s

      - alert: SeriesValidationHighFailureRate
        expr: |
          rate(series_validation_failed_total{module="facturacao-ms-core"}[5m]) > 0.5
        for: 5m
        labels:
          severity: high
          team: facturacao
        annotations:
          summary: "Alta taxa de falhas de validação de séries"
          description: |
            Taxa de falhas de validação: {{ $value }}/s
            Verificar regras de validação e integração com SIGT/Certificação.

      - alert: FeignClientHighErrorRate
        expr: |
          rate(http_client_requests_seconds_count{outcome="SERVER_ERROR",job="facturacao-ms-core"}[5m]) > 0.1
        for: 3m
        labels:
          severity: high
          team: facturacao
        annotations:
          summary: "Alta taxa de erros em chamadas Feign (APIs externas)"
          description: |
            Verificar conectividade com SIGT, Certificação e User Management.

      - alert: JvmHeapUsageHigh
        expr: |
          (jvm_memory_used_bytes{area="heap",job="facturacao-ms-core"}
           / jvm_memory_max_bytes{area="heap",job="facturacao-ms-core"}) > 0.85
        for: 10m
        labels:
          severity: high
          team: facturacao
        annotations:
          summary: "Uso de Heap JVM acima de 85%"
          description: |
            Uso actual: {{ $value | humanizePercentage }}
            Risco de OutOfMemoryError.

  # ──────────────────────────────────────────────────
  # MÉDIOS (P3) - Responder em <4h
  # ──────────────────────────────────────────────────
  - name: series-medium
    rules:

      - alert: SeriesCreationRateDrop
        expr: |
          sum(rate(series_created_total{module="facturacao-ms-core"}[1h])) == 0
        for: 30m
        labels:
          severity: medium
          team: facturacao
        annotations:
          summary: "Nenhuma série criada na última hora"
          description: |
            Pode indicar inatividade legítima ou problema silencioso.
            Verificar se há requisições chegando ao endpoint /serial-number/register.

      - alert: HikariConnectionPoolExhaustion
        expr: |
          hikaricp_connections_active{job="facturacao-ms-core"}
          / hikaricp_connections_max{job="facturacao-ms-core"} > 0.8
        for: 5m
        labels:
          severity: medium
          team: facturacao
        annotations:
          summary: "Pool de conexões Oracle acima de 80%"
          description: |
            Conexões activas: {{ $value | humanizePercentage }} do máximo.
            Risco de timeout de conexão.

      - alert: ThreadPoolSaturation
        expr: |
          (jvm_threads_live_threads{job="facturacao-ms-core"}
           / jvm_threads_daemon_threads{job="facturacao-ms-core"}) > 5
        for: 10m
        labels:
          severity: medium
          team: facturacao
        annotations:
          summary: "Alta proporção de threads não-daemon"
          description: "Possível thread leak ou contenção."
