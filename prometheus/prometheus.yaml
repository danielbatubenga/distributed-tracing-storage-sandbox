# Prometheus Configuration
# Scraping de métricas da aplicação, Actuator, JVM e OTel Collector

global:
  scrape_interval: 15s          # Coleta métricas a cada 15s
  evaluation_interval: 15s      # Avalia alertas a cada 15s
  scrape_timeout: 10s

# Carrega regras de alerta
rule_files:
  - "alert-rules.yml"

scrape_configs:

  # ─── Aplicação Spring Boot (Micrometer Prometheus) ───────────────────────
  - job_name: java-app
    metrics_path: /app/actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets:
          - java-app:9093    # Container no docker-compose
        labels:
          service: java-app
          environment: dev

  # ─── OTel Collector (métricas do próprio collector) ──────────────────────
  - job_name: otel-collector
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets:
          - otel-collector:8889
        labels:
          service: otel-collector

  # ─── Prometheus self-monitoring ──────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus
